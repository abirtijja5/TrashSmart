<div class="login-page">

  <div class="login-card">

    <div class="login-brand">
      <div class="brand-icon">♻</div>
      <span class="brand-name">TrashSmart</span>
    </div>

    <h1 class="login-title">Connexion</h1>
    <p class="login-subtitle">Accès réservé aux administrateurs</p>

    <div class="login-error" *ngIf="error">
      {{ error }}
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>

      <div class="field">
        <label for="email">Adresse email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="admin@trashsmart.fr"
          autocomplete="email"
          [class.invalid]="emailCtrl.invalid && emailCtrl.touched"
        />
        <span class="field-error" *ngIf="emailCtrl.invalid && emailCtrl.touched">
          Email invalide
        </span>
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <div class="input-wrap">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password"
            [class.invalid]="passCtrl.invalid && passCtrl.touched"
          />
          <button
            type="button"
            class="toggle-pw"
            (click)="showPassword = !showPassword"
            tabindex="-1"
          >
            {{ showPassword ? '🙈' : '👁' }}
          </button>
        </div>
        <span class="field-error" *ngIf="passCtrl.invalid && passCtrl.touched">
          6 caractères minimum
        </span>
      </div>

      <button type="submit" class="btn-login" [disabled]="loading">
        <span *ngIf="!loading">Se connecter</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>

    </form>
  </div>

</div>
