<header class="top-header">
  <div class="header-left">
    <h1 class="page-title">Poubelles connectées</h1>
    <span class="refresh-info">{{ bins.length }} poubelles au total</span>
  </div>
  <div class="header-right">
    <div class="search-wrap">
      <i class="fa-solid fa-magnifying-glass search-icon"></i>
      <input class="search-input" type="text" placeholder="Rechercher..." [(ngModel)]="searchQuery" />
    </div>
    <button class="btn-refresh" (click)="load()">
      <i class="fa-solid fa-rotate-right"></i> Actualiser
    </button>
  </div>
</header>

<div class="page-body">
  <div class="loading-overlay" *ngIf="loading">
    <i class="fa-solid fa-spinner fa-spin"></i><span>Chargement…</span>
  </div>

  <div class="card bins-card" *ngIf="!loading">
    <div class="tabs">
      <button [class.active]="activeTab==='all'"      (click)="activeTab='all'">Toutes <span class="tab-count">{{ bins.length }}</span></button>
      <button [class.active]="activeTab==='critical'" (click)="activeTab='critical'">Critiques <span class="tab-count danger">{{ count('critical') }}</span></button>
      <button [class.active]="activeTab==='warning'"  (click)="activeTab='warning'">Avertissements <span class="tab-count warning">{{ count('warning') }}</span></button>
      <button [class.active]="activeTab==='normal'"   (click)="activeTab='normal'">Normales <span class="tab-count">{{ count('normal') }}</span></button>
    </div>
    <div class="table-wrap">
      <table class="bins-table">
        <thead>
          <tr><th>ID</th><th>Emplacement</th><th>Type</th><th>Remplissage</th><th>Statut</th><th>Dernière MAJ</th><th>Action</th></tr>
        </thead>
        <tbody>
          <tr *ngFor="let bin of filtered" [class]="'row-' + bin.status">
            <td class="bin-id">{{ bin.id }}</td>
            <td>{{ bin.location }}</td>
            <td><span class="type-tag">{{ capitalize(bin.type) }}</span></td>
            <td>
              <div class="fill-row">
                <div class="fill-track"><div class="fill-thumb" [style.width.%]="bin.fillLevel" [style.background]="getFillColor(bin.fillLevel)"></div></div>
                <span class="fill-pct" [style.color]="getFillColor(bin.fillLevel)">{{ bin.fillLevel }}%</span>
              </div>
            </td>
            <td><span [class]="'status-tag ' + getStatusClass(bin.status)">{{ getStatusLabel(bin.status) }}</span></td>
            <td class="muted">{{ fmt(bin.lastUpdate) }}</td>
            <td>
              <button class="action-btn" [class.urgent]="bin.status !== 'normal'" [disabled]="bin.status === 'normal'">
                <i class="fa-solid fa-truck-fast"></i> Planifier
              </button>
            </td>
          </tr>
          <tr *ngIf="filtered.length === 0">
            <td colspan="7" class="empty-row">Aucune poubelle trouvée</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
