<header class="top-header">
  <div class="header-left">
    <h1 class="page-title">Alertes</h1>
    <span class="refresh-info">{{ alerts.length }} alertes au total</span>
  </div>
  <div class="header-right">
    <button class="btn-refresh" (click)="load()"><i class="fa-solid fa-rotate-right"></i> Actualiser</button>
  </div>
</header>

<div class="page-body">
  <div class="loading-overlay" *ngIf="loading">
    <i class="fa-solid fa-spinner fa-spin"></i><span>Chargement…</span>
  </div>

  <div class="card" *ngIf="!loading">
    <div class="card-header" style="padding-bottom:0">
      <h2>Liste des alertes</h2>
    </div>
    <div class="tabs">
      <button [class.active]="activeTab==='all'"      (click)="activeTab='all'">Toutes <span class="tab-count">{{ alerts.length }}</span></button>
      <button [class.active]="activeTab==='critical'" (click)="activeTab='critical'">Critiques <span class="tab-count danger">{{ count('critical') }}</span></button>
      <button [class.active]="activeTab==='warning'"  (click)="activeTab='warning'">Avertissements <span class="tab-count warning">{{ count('warning') }}</span></button>
    </div>

    <div class="alerts-full-list">
      <div class="alert-full-row" *ngFor="let a of filtered" [class]="'a-' + a.severity">
        <div class="af-dot"></div>
        <div class="af-body">
          <div class="af-top">
            <span class="af-bin"><i class="fa-solid fa-trash-can"></i> {{ a.binId }}</span>
            <span class="af-loc"><i class="fa-solid fa-location-dot"></i> {{ a.location }}</span>
            <span class="af-sev" [class]="a.severity">{{ a.severity === 'critical' ? 'Critique' : 'Avertissement' }}</span>
          </div>
          <p class="af-msg">{{ a.message }}</p>
          <span class="af-time">{{ formatTime(a.createdAt) }}</span>
        </div>
        <button class="btn-ack" *ngIf="!a.acknowledgedAt" (click)="acknowledge(a.id)">
          <i class="fa-solid fa-check"></i> Acquitter
        </button>
        <span class="ack-done" *ngIf="a.acknowledgedAt">
          <i class="fa-solid fa-circle-check"></i> Acquittée
        </span>
      </div>
      <div class="empty-row" *ngIf="filtered.length === 0">Aucune alerte</div>
    </div>
  </div>
</div>
