<div class="page-body">
  <div class="top-header">
    <div class="header-left">
      <h2 class="section-title">Paramètres</h2>
      <span class="header-sub">Configuration de l'application</span>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title"><i class="fa-solid fa-gear"></i> Configuration système</span>
    </div>
    <div class="settings-card">
      <!-- API Backend -->
      <div class="setting-row">
        <i class="fa-solid fa-server setting-icon blue"></i>
        <div class="setting-body">
          <span class="setting-label">API Backend</span>
          <span class="setting-val">localhost:3001/api</span>
        </div>
        <span class="setting-badge ok"><i class="fa-solid fa-circle"></i> Connecté</span>
      </div>
      <!-- Refresh auto -->
      <div class="setting-row">
        <i class="fa-solid fa-clock setting-icon amber"></i>
        <div class="setting-body">
          <span class="setting-label">Rafraîchissement automatique</span>
          <span class="setting-val">Toutes les 30 secondes</span>
        </div>
      </div>
      <!-- Auth -->
      <div class="setting-row">
        <i class="fa-solid fa-shield-halved setting-icon teal"></i>
        <div class="setting-body">
          <span class="setting-label">Authentification JWT</span>
          <span class="setting-val">Access token 15 min · Refresh token 7 jours</span>
        </div>
        <span class="setting-badge ok"><i class="fa-solid fa-lock"></i> Sécurisé</span>
      </div>
      <!-- Database -->
      <div class="setting-row">
        <i class="fa-solid fa-database setting-icon coral"></i>
        <div class="setting-body">
          <span class="setting-label">Base de données</span>
          <span class="setting-val">SQLite / PostgreSQL (configurable)</span>
        </div>
      </div>
    </div>
  </div>
</div>
