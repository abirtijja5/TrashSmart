<header class="top-header">
  <div class="header-left">
    <h1 class="page-title">Paramètres</h1>
    <span class="refresh-info">Configuration de l'application</span>
  </div>
</header>
<div class="page-body">
  <div class="card settings-card">
    <div class="setting-row">
      <i class="fa-solid fa-server setting-icon blue"></i>
      <div class="setting-body">
        <span class="setting-label">API Backend</span>
        <span class="setting-val">http://localhost:3001/api</span>
      </div>
      <span class="setting-badge ok"><i class="fa-solid fa-circle-check"></i> Connecté</span>
    </div>
    <div class="setting-row">
      <i class="fa-solid fa-clock setting-icon amber"></i>
      <div class="setting-body">
        <span class="setting-label">Rafraîchissement auto</span>
        <span class="setting-val">Toutes les 30 secondes</span>
      </div>
    </div>
    <div class="setting-row">
      <i class="fa-solid fa-shield-halved setting-icon teal"></i>
      <div class="setting-body">
        <span class="setting-label">Authentification</span>
        <span class="setting-val">OAuth2 / JWT — Access token 15 min · Refresh token 7 jours</span>
      </div>
      <span class="setting-badge ok"><i class="fa-solid fa-lock"></i> Sécurisé</span>
    </div>
    <div class="setting-row">
      <i class="fa-solid fa-database setting-icon coral"></i>
      <div class="setting-body">
        <span class="setting-label">Base de données</span>
        <span class="setting-val">SQLite (développement) · PostgreSQL en production</span>
      </div>
    </div>
  </div>
</div>
